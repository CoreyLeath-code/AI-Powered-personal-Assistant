name: Security Analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  security-audit:
    name: Dependency and Secret Shield
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for verified secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: HEAD
          extra_args: --only-verified

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install audit tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pip-audit

      - name: Audit Python dependencies
        run: pip-audit --cache-dir .pip-audit-cache -r requirements.txt

      - name: Workflow summary
        if: always()
        run: |
          {
            echo "## Security Summary"
            echo ""
            echo "- Secret scanner: TruffleHog verified findings"
            echo "- Dependency audit: pip-audit requirements.txt"
          } >> "$GITHUB_STEP_SUMMARY"
