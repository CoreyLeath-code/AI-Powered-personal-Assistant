name: Performance Benchmarking

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  benchmark:
    name: Assistant Core Latency Tracking
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run deterministic benchmark harness
        run: python benchmarks/assistant_benchmarks.py --iterations 500 --output benchmark-results.json

      - name: Validate benchmark JSON
        run: python -m json.tool benchmark-results.json > /tmp/benchmark-results.pretty.json

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: assistant-benchmark-results
          path: benchmark-results.json

      - name: Workflow summary
        if: always()
        run: |
          {
            echo "## Benchmark Summary"
            echo ""
            echo "- Harness: benchmarks/assistant_benchmarks.py"
            echo "- Output: benchmark-results.json"
            echo "- JSON validation: python -m json.tool"
          } >> "$GITHUB_STEP_SUMMARY"
