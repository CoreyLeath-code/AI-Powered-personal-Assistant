name: Code Quality Assurance

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  code-quality:
    name: Ruff and Compile Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Ruff
        run: ruff check .

      - name: Compile Python modules
        run: python -m compileall -q assistant modules agents scripts src

      - name: Workflow summary
        if: always()
        run: |
          {
            echo "## Code Quality Summary"
            echo ""
            echo "- Linter: Ruff"
            echo "- Compile target: assistant, modules, agents, scripts, src"
          } >> "$GITHUB_STEP_SUMMARY"
