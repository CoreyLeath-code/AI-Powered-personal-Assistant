name: Continuous Integration

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Tests and Coverage (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest --cov=assistant --cov=modules --cov=agents --cov=scripts --cov-report=term-missing

      - name: Workflow summary
        if: always()
        run: |
          {
            echo "## CI Summary"
            echo ""
            echo "- Python: ${{ matrix.python-version }}"
            echo "- Command: pytest with branch coverage"
            echo "- Optional ML/dashboard dependencies are excluded from core CI"
          } >> "$GITHUB_STEP_SUMMARY"
