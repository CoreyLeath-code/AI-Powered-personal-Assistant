name: SAST Code Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

jobs:
  bandit-scan:
    name: Bandit Code Flaw Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Scan source code
        run: bandit -r assistant modules agents scripts main.py -ll

      - name: Workflow summary
        if: always()
        run: |
          {
            echo "## SAST Summary"
            echo ""
            echo "- Engine: Bandit"
            echo "- Scope: assistant, modules, agents, scripts, main.py"
          } >> "$GITHUB_STEP_SUMMARY"
