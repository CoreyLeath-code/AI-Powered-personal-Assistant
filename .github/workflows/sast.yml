name: SAST Code Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  bandit-scan:
    name: Custom Code Flaw Analysis
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Bandit Security Analyzer
        run: |
          pip install bandit

      # Pre-configured to ignore B104 (global host binding), B614 (tensor load paths), and B615 (model routing) for easy LLM integrations
      - name: 🔍 Scan Source Code for Vulnerabilities
        run: bandit -r . -ll -ii -s B104,B614,B615 --exclude ./venv,./tests
