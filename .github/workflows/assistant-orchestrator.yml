name: AI Assistant Autonomous Agent Execution Loop

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-assistant:
    name: Scheduled Supervisor Smoke Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Execute assistant supervisor loop
        env:
          PYTHONPATH: .
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python agents/supervisor.py

      - name: Commit assistant logs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action [Assistant Agent]"
          git add DailyLog.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: autonomous personal assistant tracking update [skip ci]"
            git push origin main
          else
            echo "No routine tasks written to DailyLog.md today."
          fi

      - name: Workflow summary
        if: always()
        run: |
          {
            echo "## Assistant Orchestrator Summary"
            echo ""
            echo "- Script: agents/supervisor.py"
            echo "- Log target: DailyLog.md"
          } >> "$GITHUB_STEP_SUMMARY"
