name: Ingestion Schema Validation

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 12 * * *"

permissions:
  contents: read

jobs:
  schema-check:
    name: Verify Log Data Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate session log JSON
        run: python -m json.tool logs/session_log.json > /tmp/session_log.pretty.json

      - name: Render metrics table
        run: python scripts/generate_metrics_table.py > /tmp/performance_metrics.md

      - name: Export CSV metrics
        run: python scripts/export_to_csv.py

      - name: Upload generated metrics artifacts
        uses: actions/upload-artifact@v4
        with:
          name: assistant-generated-metrics
          path: |
            /tmp/performance_metrics.md
            logs/performance_metrics.csv

      - name: Workflow summary
        if: always()
        run: |
          {
            echo "## Data Validation Summary"
            echo ""
            echo "- Validated: logs/session_log.json"
            echo "- Generated: performance metrics Markdown and CSV"
          } >> "$GITHUB_STEP_SUMMARY"
