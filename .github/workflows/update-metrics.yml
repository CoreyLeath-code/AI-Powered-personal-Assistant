name: Generate README Metrics Table

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  generate-metrics:
    name: Generate Metrics Preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate metrics Markdown
        run: python scripts/generate_metrics_table.py > README_METRICS.md

      - name: Upload metrics preview
        uses: actions/upload-artifact@v4
        with:
          name: readme-metrics-preview
          path: README_METRICS.md

      - name: Workflow summary
        if: always()
        run: |
          {
            echo "## Metrics Preview Summary"
            echo ""
            echo "- Generated artifact: README_METRICS.md"
            echo "- README updates remain reviewed changes, not bot pushes"
          } >> "$GITHUB_STEP_SUMMARY"
