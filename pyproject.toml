[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-ra --basetemp=.pytest_tmp"

[tool.coverage.run]
branch = true
source = ["assistant", "modules", "agents", "scripts"]
omit = ["scripts/streamlit_dashboard.py"]

[tool.coverage.report]
show_missing = true
skip_covered = true

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"src/llm_engine.py" = ["F401"]
